<!DOCTYPE html>
<html>
<head>
<title>Storage Analysis Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>

</head>

<body>

<h1>Storage Analysis Dashboard</h1>

<div class="upload">
<input type="file" id="csvFile" accept=".csv">
</div>

<div class="kpi-container">

<div class="kpi">
<h3>Total Servers</h3>
<p id="totalServers">0</p>
</div>

<div class="kpi">
<h3>Total BAK Files</h3>
<p id="totalFiles">0</p>
</div>

<div class="kpi">
<h3>Total Storage</h3>
<p id="totalStorage">0</p>
</div>

<div class="kpi">
<h3>Largest Backup</h3>
<p id="largestFile">0</p>
</div>

</div>

<div class="chart-container">
<canvas id="driveChart"></canvas>
</div>

<div class="chart-container">
<canvas id="serverChart"></canvas>
</div>

<div class="chart-container">
<canvas id="sizeChart"></canvas>
</div>

<div class="chart-container">
<canvas id="ageChart"></canvas>
</div>

<h2>Backup Files Table</h2>

<table id="dataTable" class="display">
<thead>
<tr>
<th>Hostname</th>
<th>PrivateIP</th>
<th>Drive</th>
<th>FileName</th>
<th>FullPath</th>
<th>SizeBytes</th>
<th>LastModified</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script src="app.js"></script>

</body>
</html>
