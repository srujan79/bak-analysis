<!DOCTYPE html>
<html>

<head>

<title>Backup Storage Analyzer</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Upload Backup CSV</h1>

<input type="file" id="csvFile">

<div class="metrics">

<div id="totalSize"></div>
<div id="totalVMs"></div>
<div id="totalFiles"></div>
<div id="largestBackup"></div>

</div>

<h2>Storage by VM</h2>
<canvas id="vmChart"></canvas>

<h2>Storage by Drive</h2>
<canvas id="driveChart"></canvas>

<h2>Largest Backup Files</h2>

<table id="largestTable">

<thead>
<tr>
<th>Hostname</th>
<th>FileName</th>
<th>Size (GB)</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script src="script.js"></script>

</body>
</html>
