<!DOCTYPE html>
<html>
<head>
<title>Storage Analysis Dashboard</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fluentui/web-components/dist/fluentui.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<style>
body {
font-family: "Segoe UI", Arial;
background:#f5f5f5;
margin:40px;
}

.card {
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

h1 {
color:#0078D4;
}

</style>

</head>

<body>

<h1>Storage Analysis Dashboard</h1>

<div class="card">
<input type="file" id="csvFile" accept=".csv">
</div>

<div class="card">
<h3>Total .BAK Files by Drive</h3>
<canvas id="driveChart"></canvas>
</div>

<div class="card">
<h3>Top Servers by BAK File Count</h3>
<canvas id="serverChart"></canvas>
</div>

<script src="app.js"></script>

</body>
</html>
