<!DOCTYPE html>
<html>
<head>
<title>Storage Analysis Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
</head>

<body>

<div class="header">
  <h1>Storage Analysis Dashboard</h1>
  <span class="credit">Created by Srujan Garde at VitalEdge Technologies</span>
</div>

<div class="upload">
<input type="file" id="csvFile" accept=".csv">
</div>

<div class="kpi-container">
<div class="kpi"><h3>Total Servers</h3><p id="totalServers">0</p></div>
<div class="kpi"><h3>Total Customers</h3><p id="totalCustomers">0</p></div>
<div class="kpi"><h3>Total BAK Files</h3><p id="totalFiles">0</p></div>
<div class="kpi"><h3>Total Storage</h3><p id="totalStorage">0</p></div>
<div class="kpi"><h3>Largest Backup</h3><p id="largestFile">0</p></div>
</div>

<div class="chart-container"><canvas id="driveChart"></canvas></div>
<div class="chart-container"><canvas id="serverChart"></canvas></div>
<div class="chart-container"><canvas id="sizeChart"></canvas></div>
<div class="chart-container"><canvas id="ageChart"></canvas></div>
<div class="chart-container"><canvas id="customerChart"></canvas></div>

<h2>Backup Files Table</h2>

<button id="downloadCsv">Download Filtered CSV</button>

<table id="dataTable" class="display">
<thead>
<tr>
<th><span class="col-title">Hostname</span></th>
<th><span class="col-title">Customer</span></th>
<th><span class="col-title">PrivateIP</span></th>
<th><span class="col-title">Drive</span></th>
<th><span class="col-title">FileName</span></th>
<th><span class="col-title">FullPath</span></th>
<th><span class="col-title">Size (GB)</span></th>
<th><span class="col-title">LastModified</span></th>
</tr>

<tr>
<th><input type="text"></th>
<th><input type="text"></th>
<th><input type="text"></th>
<th><input type="text"></th>
<th><input type="text"></th>
<th><input type="text"></th>
<th><input type="text"></th>
<th><input type="text"></th>
</tr>
</thead>
<tbody></tbody>
</table>

<!-- FILTER POPUP -->
<div id="filterPopup" class="filter-popup" style="display:none;">
<input type="text" id="filterSearch" placeholder="Search...">

<div id="selectedValues"></div>

<div id="dateFilter">
<label>From: <input type="date" id="dateFrom"></label>
<label>To: <input type="date" id="dateTo"></label>
</div>

<div id="sizeFilter">
<label>Min: <input type="number" id="sizeMin"></label>
<label>Max: <input type="number" id="sizeMax"></label>
</div>

<label><input type="radio" name="mode" value="include" checked> Include</label>
<label><input type="radio" name="mode" value="exclude"> Exclude</label>

<div>
<button id="selectAll">Select All</button>
<button id="clearAll">Clear</button>
</div>

<div id="filterValues"></div>

<button id="applyFilter">Apply</button>
</div>

<script src="app.js"></script>

</body>
</html>
